<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Built by the PaaS</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    body {
      display: grid; place-items: center;
      background: radial-gradient(1200px 600px at 20% 10%, #1f2937 0%, #0b1020 50%, #050816 100%);
      color: #e5e7eb;
    }
    .card {
      padding: 2.5rem 3rem;
      border: 1px solid #1f2937;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 640px;
    }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; color: #a5f3fc; }
    p  { margin: .25rem 0; color: #94a3b8; line-height: 1.6; }
    code { color: #f9a8d4; }
    .tag {
      display: inline-block; margin-top: 1rem;
      padding: .25rem .6rem; border-radius: 999px;
      background: #064e3b; color: #6ee7b7; font-size: .75rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>hello from your self-hosted PaaS</h1>
    <p>This page was built in-cluster by <code>Kaniko</code>,</p>
    <p>pushed to <code>ttl.sh</code>, and deployed to Talos via Traefik + Cloudflare Tunnel.</p>
    <p>Source: <code>github.com/jamilshaikh07/paas-sample-hello</code></p>
    <span class="tag">build #11</span>
  </main>
</body>
</html>
